<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GymControl — Acceso</title>
  <link rel="stylesheet" href="login.css">
</head>


<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="split">

    <!-- Panel izquierdo -->
    <div class="panel-left">

      <div class="logo">
        <div class="logo-icon">💪</div>
        <span class="logo-name">GymControl</span>
      </div>

      <div class="hero-text">
        <h1>
          Sin
          <span class="outline">Límites</span>
          <span class="sub-outline">Sin excusas</span>
        </h1>
        <p>Administra tu gimnasio con precisión. Miembros, membresías y pagos en un solo lugar.</p>
      </div>

      <div class="stats-row">
        <div class="stat-item">
          <div class="num">24<span>/7</span></div>
          <div class="label">Disponible</div>
        </div>
        <div class="stat-item">
          <div class="num">100<span>%</span></div>
          <div class="label">Control</div>
        </div>
        <div class="stat-item">
          <div class="num">3</div>
          <div class="label">Módulos</div>
        </div>
      </div>

    </div>

    <!-- Panel derecho -->
    <div class="panel-right">

      <div class="form-tag">Acceso al sistema</div>

      <div class="form-heading">
        Entra<br>
        <span>al panel</span>
      </div>

      <form id="loginForm">
        <div class="field">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="usuario@correo.com" required>
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-login" id="btn">Entrar al sistema →</button>
      </form>

      <p id="mensaje"></p>

      <div class="form-footer">GymControl · Sistema de gestión · 2025</div>
    </div>

  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const mensaje  = document.getElementById('mensaje');
      const btn      = document.getElementById('btn');

      btn.disabled = true;
      btn.textContent = 'Verificando...';
      mensaje.textContent = '';
      mensaje.className = '';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          mensaje.textContent = data.error || 'Credenciales incorrectas';
          btn.disabled = false;
          btn.textContent = 'Entrar al sistema →';
          return;
        }

        mensaje.textContent = 'Acceso concedido — redirigiendo…';
        mensaje.className = 'ok';
        setTimeout(() => { window.location.href = '/index.html'; }, 900);

      } catch (err) {
        console.error(err);
        mensaje.textContent = 'Error de conexión';
        btn.disabled = false;
        btn.textContent = 'Entrar al sistema →';
      }
    });
  </script>

</body>
</html>
